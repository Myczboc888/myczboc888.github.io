<body>


<div id="home">

<h1>🦌 Forest Base Builder</h1>

<p>🌲 Создай свою лесную крепость</p>

<button onclick="startGame()">
🔥 Начать строительство
</button>

<p>Любительский проект</p>

</div>


<div id="game">

<h1>🌲 Forest Base Builder</h1>


<div class="buttons">

<button onclick="openMenu()">🎒 Меню</button>

<button onclick="removeMode()">❌ Убрать предмет</button>

<button onclick="clearBase()">🗑️ Убрать базу</button>

</div>


<div id="menu">

<h2>🎒 Снаряжение</h2>

<button onclick="choose('🌲')">🌲 Лесной страж</button>
<button onclick="choose('🪵')">🪵 Бревенчатый барьер</button>
<button onclick="choose('⚔️')">⚔️ Острые колья</button>
<button onclick="choose('🐻')">🐻 Дикая ловушка</button>
<button onclick="choose('🛏️')">🛏️ Место отдыха</button>
<button onclick="choose('❄️')">❄️ Холодный сундук</button>
<button onclick="choose('🥕')">🥕 Лесная грядка</button>
<button onclick="choose('📦')">📦 Ящик хранения</button>
<button onclick="choose('📡')">📡 Следопыт-маяк</button>
<button onclick="choose('🚪')">🚪 Лесной портал</button>
<button onclick="choose('🛢️')">🛢️ Топливный запас</button>

<button onclick="choose('🗺️')">🗺️ Карта разведки</button>
<button onclick="choose('🧭')">🧭 Навигатор леса</button>

</div>
